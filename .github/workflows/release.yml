name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Leave empty to use the current commit as a draft."
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ── Build hive-search binaries ──────────────────────────────────────

  build-search:
    strategy:
      matrix:
        include:
          - os: macos-14          # Apple Silicon
            target: aarch64-apple-darwin
            features: t5-quantized,progress,metal
            artifact: hive-search-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: t5-quantized,progress
            artifact: hive-search-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            hive-server/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('hive-server/Cargo.lock') }}

      - name: Build hive-search
        working-directory: hive-server
        run: cargo build --release --target ${{ matrix.target }} --features ${{ matrix.features }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp hive-server/target/${{ matrix.target }}/release/hive-search dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  # ── Create GitHub Release ───────────────────────────────────────────

  release:
    needs: build-search
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(echo ${{ github.sha }} | head -c 8)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' }}
          files: |
            dist/hive-search-darwin-arm64/hive-search-darwin-arm64
            dist/hive-search-linux-x64/hive-search-linux-x64
