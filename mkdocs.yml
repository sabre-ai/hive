site_name: hive
site_url: https://sabre-ai.github.io/hive/
site_description: Team server for Claude Code. Capture, enrich, and share AI coding sessions.
site_author: sabre-ai
repo_url: https://github.com/sabre-ai/hive
repo_name: sabre-ai/hive
edit_uri: ""
copyright: Copyright &copy; 2026 sabre-ai

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      separator: '[\s\-\.\_]+'
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      enable_git_follow: false
      strict: false
      type: date
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sabre-ai/hive
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/hive-team/
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - Getting Started:
    - Overview: getting-started/index.md
    - Solo Mode: getting-started/solo-mode.md
    - Claude Desktop: getting-started/desktop.md
    - Team Server: getting-started/team-server.md
    - Upgrading: getting-started/upgrading.md
    - Troubleshooting: getting-started/troubleshooting.md
    - FAQ: getting-started/faq.md
  - Tutorials:
    - Overview: tutorials/index.md
    - Daily Workflow: tutorials/workflow.md
    - Searching Your History: tutorials/searching.md
    - Asking Claude: tutorials/asking-claude.md
    - Sharing Controls: tutorials/sharing-controls.md
    - Secret Scrubbing: tutorials/secret-scrubbing.md
    - File Lineage: tutorials/file-lineage.md
    - Annotating Sessions: tutorials/annotating-sessions.md
  - Architecture: architecture/overview.md
  - Reference:
    - Overview: reference/index.md
    - CLI: reference/cli.md
    - MCP Tools: reference/mcp-tools.md
    - REST API: reference/rest-api.md
    - Configuration: reference/configuration.md
  - Security & Privacy: security.md
  - Contributing: contributing.md
  - Changelog: changelog.md
